# =====================================================================
# Build & Push de la imagen sge-vertice a Docker Hub
#
# Secretos requeridos en el repositorio (Settings → Secrets and variables
#                                        → Actions → New repository secret):
#   - DOCKER_USERNAME   Usuario de Docker Hub
#   - DOCKER_PASSWORD   Access Token de Docker Hub (recomendado sobre password)
#
# Disparadores:
#   - push a master/main
#   - push de tags vX.Y.Z (publica versionado semántico)
#   - manualmente desde la pestaña Actions ("Run workflow")
# =====================================================================

name: Build & Push Docker image

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  IMAGE_NAME: sge-vertice

jobs:
  build-and-push:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch builds (master/main → "master" o "main")
            type=ref,event=branch
            # Commit short SHA (siempre)
            type=sha,format=short
            # Tags semánticos al hacer push de tags vX.Y.Z
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # "latest" SOLO cuando el push es en la rama por defecto
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
