# =====================================================================
# sge-vertice — orquestación local / single-host
#   db    : PostgreSQL (carga el dump SQL desde ./db/initdb en su primera
#           inicialización; persiste en el volumen `pgdata`).
#   web   : Django + gunicorn (imagen construida desde ./Dockerfile).
#   nginx : Reverse proxy + servidor de estáticos y media.
# =====================================================================

services:

  db:
    image: postgres:${POSTGRES_VERSION:-15}-alpine
    container_name: vertice_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TIME_ZONE:-UTC}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Dumps SQL: se ejecutan SOLO si el volumen `pgdata` está vacío
      # (primera inicialización). Para recargar el dump hay que destruir
      # el volumen primero (`docker compose down -v`).
      - ./db/initdb:/docker-entrypoint-initdb.d:ro
    # Descomentar SOLO para desarrollo si necesitas conectar pgAdmin/dbeaver
    # desde el host. En producción mantenerlo cerrado.
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - vertice_net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: sge-vertice:latest
    container_name: vertice_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Sobrescribe DB_HOST/DB_PORT del .env: dentro de la red de compose
      # el contenedor PostgreSQL es "db" en el puerto estándar.
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_vol:/app/staticfiles
      - media_vol:/app/media
    expose:
      - "8000"
    networks:
      - vertice_net

  nginx:
    image: nginx:1.25-alpine
    container_name: vertice_nginx
    restart: unless-stopped
    depends_on:
      - web
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_vol:/usr/share/nginx/static:ro
      - media_vol:/usr/share/nginx/media:ro
    ports:
      - "${HOST_HTTP_PORT:-80}:80"
    networks:
      - vertice_net

volumes:
  pgdata:
  static_vol:
  media_vol:

networks:
  vertice_net:
    driver: bridge
