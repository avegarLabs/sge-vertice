{% extends 'layouts/crud/_base_detail.html' %}
{% load filters %}

{% block detail_elements %}
    <dt class="col-md-4 col-sm-12">Nombre:</dt>
    <dd class="col-md-8 col-sm-12">{{ object.nombre }}</dd>
    <dt class="col-md-4 col-sm-12">Codigo:</dt>
    <dd class="col-md-8 col-sm-12">{{ object.codigo }}</dd>
    <dt class="col-md-4 col-sm-12">Denominación:</dt>
    <dd class="col-md-8 col-sm-12">{{ object.denominacion }}</dd>
{% endblock %}
