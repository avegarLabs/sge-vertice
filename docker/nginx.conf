# =====================================================================
# sge-vertice — nginx reverse proxy
# Sirve estáticos/media desde volúmenes y delega el resto a gunicorn.
# =====================================================================

upstream django_app {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Tamaño máximo de subida (fotos de trabajadores, PDFs, etc.).
    client_max_body_size 25M;

    # ---- Compresión -------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ---- Estáticos colectados (collectstatic) -----------------------
    location /static/ {
        alias /usr/share/nginx/static/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---- Media (uploads de usuarios) --------------------------------
    location /media/ {
        alias /usr/share/nginx/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---- Aplicación Django via gunicorn -----------------------------
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
